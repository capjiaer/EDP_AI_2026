# step.yaml - step registry
# Register supported steps here. Project-level same-name steps override base.
#
# invoke tutor (quick):
# - invoke is a list of command segments; EDP joins them with spaces.
# - $edp(var): framework vars (e.g. $edp(script), $edp(step), $edp(tool)).
# - {var}: optional config var; missing value drops the whole segment.
# - $var: required config var; always substituted (empty if missing).
# - Variable scope precedence: tool(step,var) > tool(var).
# - Config file override order: base config < overlay config < user_config.
#   (user_config can override both tool(var) and tool(step,var))
# Example:
#   invoke:
#     - "innovus -init $edp(script)"
#     - "-threads {cpu_num}"
#     - "{nowin}"
#     - "-design $design_name"
#     - "{tee} $edp(step).log"
#   Expanded command shape (when vars exist):
#     innovus -init <abs_script.tcl> -threads 8 -nowin -design top |& tee <step>.log
#

pnr_innovus:
  supported_steps:
    init:
      invoke:
        - "innovus -init $edp(script)"
        - "{nowin}"
        - "{tee} $edp(step).log"
    floorplan:
      invoke:
        - "innovus -init $edp(script)"
        - "{nowin}"
        - "{tee} $edp(step).log"
    place:
      invoke:
        - "innovus -init $edp(script)"
        - "{nowin}"
        - "{tee} $edp(step).log"
      sub_steps:
        - global_place
        - detail_place
        - opt_design
    cts:
      invoke:
        - "innovus -init $edp(script)"
        - "{nowin}"
        - "{tee} $edp(step).log"
    route:
      invoke:
        - "innovus -init $edp(script)"
        - "{nowin}"
        - "{tee} $edp(step).log"
    postroute:
      invoke:
        - "innovus -init $edp(script)"
        - "{nowin}"
        - "{tee} $edp(step).log"
